name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint, typecheck, test
        run: npm run ci
